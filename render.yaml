services:
  - type: web
    name: zalo-mini-app-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: USE_LOCAL_DB
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        sync: false   # Set manually in Render dashboard: mysql+pymysql://vp_admin:...@157.10.199.22:3306/zalo-mini-app

  - type: static_site
    name: zalo-mini-app-frontend
    rootDir: fe
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE_URL
        value: https://db-zalo-mini-app-be.onrender.com
